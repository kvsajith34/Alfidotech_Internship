global:
  scrape_interval: 10s
  evaluation_interval: 10s

alerting:
  alertmanagers: []

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "ml-inference-api"
    static_configs:
      - targets: ["ml-api:5000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
